<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Cannon — Orbital Mechanics Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <button id="panelToggle" class="panel-toggle" aria-label="Toggle controls">☰</button>
        <aside id="controls">
            <h1 data-i18n="title">Newton's Cannon</h1>

            <section class="control-group">
                <h2 data-i18n="headingLaunch">Launch Parameters</h2>

                <label>
                    <span class="label-row">
                        <span data-i18n="labelSpeed">Speed</span>
                        <span class="value-display" id="speedValue">7.9 km/s</span>
                    </span>
                    <input type="range" id="speed">
                </label>

                <label>
                    <span class="label-row">
                        <span data-i18n="labelAltitude">Altitude above surface</span>
                        <span class="value-display" id="altitudeValue">0 km</span>
                    </span>
                    <input type="range" id="altitude">
                </label>

                <label>
                    <span class="label-row">
                        <span data-i18n="labelDirection">Launch angle</span>
                        <span class="value-display" id="directionValue">0°</span>
                    </span>
                    <input type="range" id="direction">
                </label>
            </section>

            <section class="control-group">
                <h2 data-i18n="headingSim">Simulation</h2>
                <label>
                    <span class="label-row">
                        <span data-i18n="labelTimeScale">Time scale</span>
                        <span class="value-display" id="timeScaleValue">1×</span>
                    </span>
                    <input type="range" id="timeScale">
                </label>
                <div class="sim-buttons">
                    <button id="launchBtn" class="primary">🚀 Launch</button>
                </div>
            </section>

            <section class="control-group info-panel" id="telemetrySection" style="display:none">
                <div class="telemetry-header-row">
                    <h2 data-i18n="headingTelemetry">Telemetry</h2>
                    <button id="clearAllBtn" class="clear-all-btn" title="Remove all objects">🗑️</button>
                </div>
                <div id="telemetryContainer"></div>
            </section>

            <section class="control-group">
                <h2 data-i18n="headingPresets">Presets</h2>
                <div class="preset-buttons">
                    <button class="preset" data-type="suborbital">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="v1">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="v2">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="elliptical-low">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="elliptical-high">
                        <strong></strong>
                        <span></span>
                    </button>
                </div>
            </section>
        </aside>

        <main id="sim-container">
            <canvas id="simCanvas"></canvas>
            <div id="orbit-label"></div>
            <div id="param-label"></div>
            <div class="top-bar">
                <button id="infoToggle" title="Physical Constants">ℹ️</button>
                <button id="langToggle" title="Language">EN</button>
            </div>
            <div id="infoPanel" class="info-overlay" style="display:none">
                <h3 data-i18n="infoTitle">Physical Constants</h3>
                <table>
                    <tr><td data-i18n="infoG">Gravitational constant</td><td class="mono" id="infoValG"></td></tr>
                    <tr><td data-i18n="infoM">Earth mass</td><td class="mono" id="infoValM"></td></tr>
                    <tr><td data-i18n="infoR">Earth radius</td><td class="mono" id="infoValR"></td></tr>
                </table>
            </div>
        </main>
    </div>

    <script src="sim.js"></script>
</body>
</html>
