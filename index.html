<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Cannon — Orbital Mechanics Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="controls">
            <h1>Newton's Cannon</h1>

            <section class="control-group">
                <h2>Launch Parameters</h2>

                <label>
                    <span class="label-row">
                        Speed
                        <span class="value-display" id="speedValue">7.9 km/s</span>
                    </span>
                    <input type="range" id="speed" min="0" max="20" step="0.1" value="7.9">
                </label>

                <label>
                    <span class="label-row">
                        Altitude above surface
                        <span class="value-display" id="altitudeValue">0 km</span>
                    </span>
                    <input type="range" id="altitude" min="0" max="5000" step="10" value="0">
                </label>
            </section>

            <section class="control-group">
                <h2>Simulation</h2>
                <label>
                    <span class="label-row">
                        Time scale
                        <span class="value-display" id="timeScaleValue">1×</span>
                    </span>
                    <input type="range" id="timeScale" min="1" max="20" step="1" value="5">
                </label>
                <div class="sim-buttons">
                    <button id="launchBtn" class="primary">🚀 Launch</button>
                    <button id="clearBtn">🧹 Clear Traces</button>
                    <button id="resetBtn">🎯 Reset View</button>
                </div>
            </section>

            <section class="control-group">
                <h2>Presets</h2>
                <div class="preset-buttons">
                    <button class="preset" data-type="suborbital">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="v1">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="v2">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="v3">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="elliptical-low">
                        <strong></strong>
                        <span></span>
                    </button>
                    <button class="preset" data-type="elliptical-high">
                        <strong></strong>
                        <span></span>
                    </button>
                </div>
            </section>

            <section class="control-group info-panel">
                <h2>Telemetry</h2>
                <div id="telemetryContainer"></div>
            </section>
        </aside>

        <main id="sim-container">
            <canvas id="simCanvas"></canvas>
            <div id="orbit-label"></div>
        </main>
    </div>

    <script src="sim.js"></script>
</body>
</html>
